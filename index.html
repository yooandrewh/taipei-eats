<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#f6f7f9">
<title>Taipei Eats</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --line:#e2e6ec; --ink:#1a1d23;
    --sub:#5b6472; --accent:#e4572e; --food:#e4572e; --noodle:#2f6fed; --boba:#7a2fe0;
    --good:#1e9e57; --flag:#b45309;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:10;background:rgba(246,247,249,.94);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px}
  h1{margin:0 0 2px;font-size:18px;letter-spacing:.2px}
  .sub{color:var(--sub);font-size:12px;margin-bottom:10px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input[type=search]{flex:1 1 100%;min-width:0;background:var(--card);border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:9px 11px;font-size:15px}
  select,.chip{background:var(--card);border:1px solid var(--line);color:var(--ink);
    border-radius:999px;padding:7px 11px;font-size:13px;-webkit-appearance:none;appearance:none}
  .chip{cursor:pointer;user-select:none}
  .chip.active{border-color:transparent;color:#fff}
  .chip[data-type="Food"].active{background:var(--food)}
  .chip[data-type="Noodles"].active{background:var(--noodle)}
  .chip[data-type="Boba/Dessert"].active{background:var(--boba)}
  .chip[data-type="all"].active{background:#4b5563}
  .locbtn{cursor:pointer;font:inherit;font-size:13px;display:inline-flex;align-items:center;gap:5px}
  .locbtn.on{background:var(--good);border-color:transparent;color:#fff;font-weight:650}
  .locstat{font-size:12px;color:var(--sub)}
  .locstat.err{color:var(--flag)}
  .count{color:var(--sub);font-size:12px;margin-left:auto}
  main{padding:10px 12px 40px}
  .card{background:var(--card);border:1px solid var(--line);border-left-width:4px;
    border-radius:12px;padding:11px 12px;margin:9px 0}
  .card.Food{border-left-color:var(--food)}
  .card.Noodles{border-left-color:var(--noodle)}
  .card[data-t="Boba/Dessert"]{border-left-color:var(--boba)}
  .top{display:flex;align-items:baseline;gap:8px}
  .nm{font-weight:650;font-size:16px}
  .zh{color:var(--sub);font-size:13px}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .tag{font-size:12px;color:var(--sub);background:#f0f2f5;border:1px solid var(--line);
    border-radius:7px;padding:2px 7px}
  .tag.live{color:var(--good);background:#eafaf0;border-color:#bfe6cf}
  .star{color:#e0a300}
  .notes{color:var(--sub);font-size:12.5px;margin-top:7px;line-height:1.4}
  .flag{color:var(--flag)}
  .foot{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
  a.map{display:inline-block;font-size:13px;color:#1a1d23;text-decoration:none;
    background:#eef1f5;border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  a.map:active{background:#e2e6ec}
  .vbtn{font:inherit;font-size:13px;cursor:pointer;color:var(--sub);
    background:#eef1f5;border:1px solid var(--line);border-radius:8px;padding:6px 10px}
  .vbtn.done{background:#eafaf0;border-color:#bfe6cf;color:var(--good);font-weight:650}
  .chip.on{background:#4b5563;border-color:transparent;color:#fff}
  #views .chip.active{background:#111827;border-color:transparent;color:#fff}
  .card.eaten{opacity:.55}
  .tag.spicy{color:#c0392b;background:#fdecea;border-color:#f5c6c0}
  .rk{margin-left:auto;font-size:12px;color:var(--sub);background:#f0f2f5;
    border:1px solid var(--line);border-radius:7px;padding:2px 7px;white-space:nowrap}
  .rknum{margin-left:auto;font-weight:800;font-size:17px;color:var(--accent);
    background:#fff3ef;border:1px solid #f6c9ba;border-radius:9px;padding:2px 10px;white-space:nowrap}
</style>
</head>
<body>
<header>
  <h1>Taipei Eats <span style="font-size:11px;font-weight:400;color:var(--sub)">v12 · Jul 5</span></h1>
  <div class="sub" id="subtitle">Ranked and sortable. Distances from your Gongguan apartment. Tap a card to open it in Google Maps.</div>
  <div class="row" style="margin-bottom:8px" id="views">
    <span class="chip active" data-view="browse">All spots</span>
    <span class="chip" data-view="alltime">&#127942; All-time best</span>
  </div>
  <div class="row" style="margin-bottom:8px">
    <input id="q" type="search" placeholder="Search name, dish, area (English or Chinese)">
  </div>
  <div class="row" style="margin-bottom:8px" id="types">
    <span class="chip active" data-type="all">All</span>
    <span class="chip" data-type="Food">Food</span>
    <span class="chip" data-type="Noodles">Noodles</span>
    <span class="chip" data-type="Boba/Dessert">Boba / Dessert</span>
  </div>
  <div class="row" style="margin-bottom:8px">
    <button id="loc" class="chip locbtn" type="button">&#128205; Use my location</button>
    <span class="locstat" id="locstat"></span>
  </div>
  <div class="row" style="margin-bottom:8px">
    <span class="chip" id="hideflag">Hide flagged spots</span>
    <span class="chip" id="spicyonly">&#127798; Spicy only</span>
  </div>
  <div class="row">
    <select id="sort">
      <option value="dist">Sort: Nearest</option>
      <option value="rating">Sort: Highest rated</option>
      <option value="priceLow">Sort: Cheapest</option>
      <option value="listrank">Sort: List rank</option>
      <option value="grank">Sort: All-time rank</option>
      <option value="name">Sort: A to Z</option>
    </select>
    <select id="cat">
      <option value="all">All dishes</option>
    </select>
    <select id="area">
      <option value="all">All areas</option>
    </select>
    <select id="maxprice">
      <option value="9999">Any price</option>
      <option value="100">Under NT$100</option>
      <option value="150">Under NT$150</option>
      <option value="200" selected>Under NT$200</option>
      <option value="250">Under NT$250</option>
      <option value="300">Under NT$300</option>
      <option value="400">Under NT$400</option>
      <option value="500">Under NT$500</option>
    </select>
    <select id="minrating">
      <option value="0">Any rating</option>
      <option value="4">4.0+ stars</option>
      <option value="4.3">4.3+ stars</option>
      <option value="4.5">4.5+ stars</option>
    </select>
    <select id="maxdist">
      <option value="9999">Any distance</option>
      <option value="1">Within 1 km</option>
      <option value="2">Within 2 km</option>
      <option value="5">Within 5 km</option>
    </select>
    <select id="openday">
      <option value="any">Open any day</option>
      <option value="today">Open today</option>
      <option value="Mon">Open Monday</option>
      <option value="Tue">Open Tuesday</option>
      <option value="Wed">Open Wednesday</option>
      <option value="Thu">Open Thursday</option>
      <option value="Fri">Open Friday</option>
      <option value="Sat">Open Saturday</option>
      <option value="Sun">Open Sunday</option>
    </select>
    <select id="status">
      <option value="all">All spots</option>
      <option value="todo">Not eaten</option>
      <option value="eaten">Eaten</option>
    </select>
    <span class="count" id="count"></span>
  </div>
</header>
<main id="list"></main>

const list=document.getElementById('list');
const q=document.getElementById('q');
const sortSel=document.getElementById('sort');
const maxP=document.getElementById('maxprice');
const minR=document.getElementById('minrating');
const maxD=document.getElementById('maxdist');
const catSel=document.getElementById('cat');
const areaSel=document.getElementById('area');
const openSel=document.getElementById('openday');
const statusSel=document.getElementById('status');
const hideFlagChip=document.getElementById('hideflag');
const countEl=document.getElementById('count');
let hideFlagged=false;

// ---- eaten log (saved on this device) ----
const EKEY='taipei_eaten';
let eaten=new Set();
try{ eaten=new Set(JSON.parse(localStorage.getItem(EKEY)||localStorage.getItem('taipei_visited')||'[]')); }catch(e){}
function vid(d){return d.type+'|'+d.name+'|'+d.zh;}
function saveEaten(){ try{ localStorage.setItem(EKEY,JSON.stringify([...eaten])); }catch(e){} }
list.addEventListener('click',e=>{
  const b=e.target.closest('.vbtn'); if(!b) return;
  const id=b.dataset.id;
  if(eaten.has(id)) eaten.delete(id); else eaten.add(id);
  saveEaten(); render();
});

// ---- derived helpers: dish category, district, closed days, flagged ----
const DISTRICTS=['Gongguan',"Da'an",'Ximending','Xinyi','Zhongshan','Wanhua','Datong','Zhongzheng','Songshan','Shilin','Sanchong'];
function district(d){ const head=d.area.split('/')[0]; for(const k of DISTRICTS){ if(head.indexOf(k)>=0) return k; } return 'Other'; }
const DAYABBR=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function closedDays(notes){
  const set=new Set();
  const m=notes.match(/Closed ([A-Za-z\/]+)/);
  if(m){ m[1].split('/').forEach(x=>{ const dd=x.slice(0,3); if(DAYABBR.indexOf(dd)>=0) set.add(dd); }); }
  if(/Weekdays only/i.test(notes)){ set.add('Sat'); set.add('Sun'); }
  return set;
}
function isFlagged(notes){ return /(SLIPPING|HYGIENE|PRICIER)/.test(notes); }
DATA.forEach(d=>{ d.district=district(d); d.closed=closedDays(d.notes); d.flagged=isFlagged(d.notes); });

// populate category + area dropdowns from the data
[...new Set(DATA.map(d=>d.cat))].sort().forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });
[...new Set(DATA.map(d=>d.district))].sort().forEach(a=>{ const o=document.createElement('option'); o.value=a; o.textContent=a; areaSel.appendChild(o); });

hideFlagChip.addEventListener('click',()=>{ hideFlagged=!hideFlagged; hideFlagChip.classList.toggle('on',hideFlagged); render(); });

const spicyChip=document.getElementById('spicyonly');
let spicyOnly=false;
spicyChip.addEventListener('click',()=>{ spicyOnly=!spicyOnly; spicyChip.classList.toggle('on',spicyOnly); render(); });

let view='browse';
let browsePrice=null;   // remembers the budget cap while in the all-time view
maxP.addEventListener('change',()=>{ if(view==='alltime') browsePrice=null; }); // user overrode it there
document.getElementById('views').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c) return;
  view=c.dataset.view;
  [...document.querySelectorAll('#views .chip')].forEach(x=>x.classList.toggle('active',x===c));
  if(view==='alltime'){
    sortSel.value='grank';
    if(maxP.value!=='9999'){ browsePrice=maxP.value; maxP.value='9999'; } // show the full podium
  } else {
    if(sortSel.value==='grank') sortSel.value='dist';
    if(browsePrice!==null){ maxP.value=browsePrice; browsePrice=null; }   // restore budget cap
  }
  render();
});
const locBtn=document.getElementById('loc');
const locStat=document.getElementById('locstat');
const subtitle=document.getElementById('subtitle');
let activeType='all';
let userPos=null;   // {lat,lng} when live location active

document.getElementById('types').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  activeType=c.dataset.type;
  [...document.querySelectorAll('#types .chip')].forEach(x=>x.classList.toggle('active',x===c));
  render();
});
[q,sortSel,maxP,minR,maxD,catSel,areaSel,openSel,statusSel].forEach(el=>{
  el.addEventListener('input',render);
  el.addEventListener('change',render);   // iOS Safari doesn't reliably fire 'input' on <select>
});

// ---- live location ----
function haversine(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const dLa=(c-a)*r,dLo=(d-b)*r;
  const h=Math.sin(dLa/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
locBtn.addEventListener('click',()=>{
  if(userPos){ // toggle off
    userPos=null; locBtn.classList.remove('on');
    locBtn.innerHTML='&#128205; Use my location'; locStat.textContent=''; locStat.className='locstat';
    subtitle.textContent='Ranked and sortable. Distances from your Gongguan apartment. Tap a card to open it in Google Maps.';
    render(); return;
  }
  if(!navigator.geolocation){ locStat.textContent='Location not supported on this browser.'; locStat.className='locstat err'; return; }
  locStat.textContent='Locating…'; locStat.className='locstat';
  navigator.geolocation.getCurrentPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    DATA.forEach(d=>{ d.live=haversine(userPos.lat,userPos.lng,d.lat,d.lng); });
    locBtn.classList.add('on'); locBtn.innerHTML='&#128205; Location on · tap to turn off';
    locStat.textContent='Showing straight-line distance from you (approx).'; locStat.className='locstat';
    subtitle.textContent='Sorted by how close each spot is to you right now. Distances are approximate straight-line.';
    sortSel.value='dist';
    render();
  },err=>{
    locStat.className='locstat err';
    locStat.textContent = err.code===1 ? 'Location permission denied. Enable it in Settings › Safari.' :
                          err.code===3 ? 'Location timed out. Try again.' : 'Could not get your location.';
  },{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
});

function mapUrl(d){
  const query=encodeURIComponent(d.zh && d.zh!=='' ? d.zh+' Taipei' : d.name+' Taipei');
  return 'https://www.google.com/maps/search/?api=1&query='+query;
}
function flagNotes(t){
  return t.replace(/(NEW\.|SLIPPING[^.]*\.|HYGIENE[^.]*\.|PRICIER[^.]*\.|SEASONAL[^.]*\.|CLOSED[^.]*\.|NEAR YOU[.]?|IDENTITY\?[^.]*\.)/g,
    m=>'<span class="flag">'+m+'</span>');
}
function distTag(d){
  if(userPos) return '<span class="tag live">&#128205; ~'+d.live.toFixed(1)+' km from you</span>';
  return '<span class="tag">'+d.dist+' km &middot; '+d.travel+'</span>';
}
function render(){
  const term=q.value.trim().toLowerCase();
  const mp=parseFloat(maxP.value), mr=parseFloat(minR.value), md=parseFloat(maxD.value);
  const sv=statusSel.value, cv=catSel.value, av=areaSel.value, ov=openSel.value;
  const targetDay = ov==='today' ? DAYABBR[new Date().getDay()] : (ov==='any'?null:ov);
  let rows=DATA.filter(d=>{
    if(activeType!=='all' && d.type!==activeType) return false;
    if(cv!=='all' && d.cat!==cv) return false;
    if(av!=='all' && d.district!==av) return false;
    if(d.priceLow>mp) return false;
    if(d.rating<mr) return false;
    if(md<9999 && (userPos?d.live:d.dist)>md) return false;
    if(hideFlagged && d.flagged) return false;
    if(spicyOnly && !d.spicy) return false;
    if(targetDay && d.closed.has(targetDay)) return false;
    const isV=eaten.has(vid(d));
    if(sv==='todo' && isV) return false;
    if(sv==='eaten' && !isV) return false;
    if(term){
      const hay=(d.name+' '+d.zh+' '+d.cat+' '+d.area).toLowerCase();
      if(!hay.includes(term)) return false;
    }
    return true;
  });
  if(view==='alltime'){
    const seen=new Set();
    rows=rows.filter(d=>{ if(!d.grank || seen.has(d.zh)) return false; seen.add(d.zh); return true; });
    subtitle.textContent='Top 100 all-time — only places with verified acclaim (guides, Reddit, Michelin, large review counts) get a rank. Filters and sorting still apply.';
  } else {
    subtitle.textContent = userPos
      ? 'Sorted by how close each spot is to you right now. Distances are approximate straight-line.'
      : 'Ranked and sortable. Distances from your Gongguan apartment. Tap a card to open it in Google Maps.';
  }
  const s=sortSel.value;
  rows.sort((a,b)=>{
    if(s==='dist'){ const av=userPos?a.live:a.dist, bv=userPos?b.live:b.dist; return av-bv; }
    if(s==='rating') return b.rating-a.rating || (userPos?a.live-b.live:a.dist-b.dist);
    if(s==='priceLow') return a.priceLow-b.priceLow || b.rating-a.rating;
    if(s==='listrank') return a.rank-b.rank || b.rating-a.rating;
    if(s==='grank') return (a.grank||9999)-(b.grank||9999) || b.rating-a.rating;
    if(s==='name') return a.name.localeCompare(b.name);
  });
  let countTxt;
  if(view==='alltime'){
    const seenAll=new Set(); let total=0;
    DATA.forEach(d=>{ if(d.grank && !seenAll.has(d.zh)){ seenAll.add(d.zh); total++; } });
    countTxt=rows.length+' of '+total+' ranked'+(rows.length<total?' ('+(total-rows.length)+' hidden by filters)':'');
  } else {
    countTxt=rows.length+' places';
  }
  countEl.textContent=countTxt+(eaten.size?' · '+eaten.size+' eaten':'');
  list.innerHTML=rows.map(d=>{
    const isV=eaten.has(vid(d));
    const rankBadge = view==='alltime'
      ? `<span class="rknum" title="All-time rank">#${d.grank}</span>`
      : `<span class="rk" title="Rank within ${d.type} list">#${d.rank}</span>`;
    return `
    <div class="card ${d.type}${isV?' eaten':''}" data-t="${d.type}">
      <div class="top">
        <span class="nm">${d.name}</span>
        <span class="zh">${d.zh||''}</span>
        ${rankBadge}
      </div>
      <div class="meta">
        <span class="tag"><span class="star">&#9733;</span> ${d.rating.toFixed(1)}</span>
        <span class="tag">NT$${d.price}</span>
        ${distTag(d)}
        <span class="tag">${d.cat}</span>
        ${d.spicy?'<span class="tag spicy">&#127798; Spicy</span>':''}
        <span class="tag">${d.area}</span>
      </div>
      <div class="notes">${flagNotes(d.notes)}</div>
      <div class="foot">
        <a class="map" href="${mapUrl(d)}" target="_blank" rel="noopener">Open in Google Maps &rarr;</a>
        <button class="vbtn${isV?' done':''}" data-id="${vid(d)}">${isV?'✓ Eaten':'Mark eaten'}</button>
      </div>
    </div>`;}).join('');
}
render();
</script>
</body>
</html>
